# tasks/daily-briefing.yaml — Daily Briefing Scheduled Task

schedule: "0 9 * * *"
sessionTarget: "isolated"
timezone: "America/Sao_Paulo"

agentTurn:
  announce: true
  message: "Execute o daily briefing e entregue no tópico Daily Briefing."

